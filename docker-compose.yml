services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-serverpoint}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-serverpoint}
      POSTGRES_DB: ${DB_NAME:-serverpoint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-serverpoint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    ports:
      - "8081:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-serverpoint}
      DB_PASSWORD: ${DB_PASSWORD:-serverpoint}
      DB_NAME: ${DB_NAME:-serverpoint}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AES_KEY: ${AES_KEY:-0123456789abcdef0123456789abcdef}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8081/api}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081/api}
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1420

volumes:
  pgdata:
